<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <!-- TODO add margin without using section class-->
  <body>
    <p>Total number of frames and iframes: 2</p>
    <p>
      <u>Frame elements</u>
    </p>
    <p>Total number of frames: 2</p>
    <p>Not blacklisted frames (2):</p>
    <ol class="detections">
      <li>
        <button class="tooltip">
          <span class="tooltiptext">Copy to clipboard</span>
          <img src="copy.svg" />
        </button>
        <p>1.</p>
        <a href="https://frame1.com">https://frame1.com</a>
      </li>
      <li>
        <button class="tooltip">
          <span class="tooltiptext">Copy to clipboard</span>
          <img src="copy.svg" />
        </button>
        <p>2.</p>
        <a href="about:blank">about:blank</a>
      </li>
    </ol>
    <p>
      <u>IFrame elements</u>
    </p>
    <p>Total number of iframes: 0</p>
    <script>
      // Select all buttons with the class 'copy-button'
      const buttons = document.querySelectorAll('.detections button');
      buttons.forEach(button => {
        button.addEventListener('mouseenter', function() {
          button.classList.toggle('show');
        });
        button.addEventListener('mouseleave', function() {
          button.classList.toggle('show');
        });
        button.addEventListener('click', function() {
          const url = this.parentElement.querySelector('a').href;
          // Find the anchor tag in the same list item
          // Copy the URL to the clipboard
          navigator.clipboard.writeText(url).then(() => {
            console.log('Copied to clipboard: ' + url);
            const button = this.parentElement.querySelector('button');
            const image = button.querySelector('img');
            const tooltip = button.querySelector('span');
            const originalText = tooltip.textContent;
            const originalSrc = image.src;
            image.src = 'ok.svg';
            tooltip.textContent = 'Copied';
            setTimeout(() => {
                image.src = originalSrc;
                tooltip.textContent = originalText;
            }, 1000);
          }).catch(err => {
            console.error('Failed to copy: ', err);
          });
        });
      });
    </script>
  </body>
</html>
