<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <!-- TODO add margin without using section class-->
  <body>
    <p>Total number of frames and iframes: 2</p>
    <p>
      <u>Frame elements</u>
    </p>
    <p>Total number of frames: 2</p>
    <p>Not blacklisted frames (2):</p>
    <ol class="detections">
      <li>
        <button title="Copy to clipboard">
          <img src="copy.svg" /></button>
        <a href="https://frame1.com">https://frame1.com</a>
      </li>
      <li>
        <button title="Copy to clipboard">
          <img src="copy.svg" /></button>
        <a href="about:blank">about:blank</a>
      </li>
    </ol>
    <ol class="detections2">
      <li>
        <button title="Copy to clipboard">
          <img src="copy.svg" /></button>
        <p>1.</p>
        <a href="https://frame1.com">https://frame1.com</a>
      </li>
      <li>
        <button title="Copy to clipboard">
          <img src="copy.svg" /></button>
        <p>2.</p>
        <a href="about:blank">about:blank</a>
      </li>
    </ol>
    <p>
      <u>IFrame elements</u>
    </p>
    <p>Total number of iframes: 0</p>
    <script>
      // Select all buttons with the class 'copy-button'
      const buttons = document.querySelectorAll('.copyButton');
      buttons.forEach(button => {
        button.addEventListener('click', function() {
          // Find the anchor tag in the same list item
          const url = this.nextElementSibling.href;
          // Copy the URL to the clipboard
          navigator.clipboard.writeText(url).then(() => {
            alert('Copied to clipboard: ' + url);
          }).catch(err => {
            console.error('Failed to copy: ', err);
          });
        });
      });
    </script>
  </body>
</html>
