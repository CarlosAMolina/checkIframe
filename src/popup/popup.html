<!doctype html>

<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div id="popup-content">
      <div id="error-content" class="hidden">
        <p>This web page cannot be analyzed</p>
      </div>
      <div id="topButtons" class="oneLineButtons">
        <button id="buttonRecheck" title="Recheck">
          <img src="/icons/recheck.svg" alt="Recheck" />
        </button>
        <button id="buttonScroll" title="Scroll to element">
          <img src="/icons/locate.svg" alt="Scroll to element" />
        </button>
        <button id="buttonClean" title="Clean border">
          <img src="/icons/noHighlight.svg" alt="Clean border" />
        </button>
      </div>
      <p id="infoScroll" class="backgroundGray hidden"></p>
      <button id="buttonShowSources">Show tags info</button>
      <div
        id="infoTags"
        class="backgroundGray sources-container hidden"
      ></div>
      <button id="buttonShowConfig">Configuration</button>
      <div id="menuConfig" class="backgroundGray hidden">
        <div class="switchConfig">
          <button id="buttonAlwaysShowSources">
            <div>off</div>
          </button>
          <p>Always show tags info</p>
        </div>
        <div class="switchConfig">
          <button id="buttonAutomaticDetection">
            <div>off</div>
          </button>
          <p>Automatic detection</p>
        </div>
        <div class="switchConfig">
          <button id="buttonHighlightAllAutomatically">
            <div>off</div>
          </button>
          <p>Automatic highlighting</p>
        </div>
        <div class="switchConfig">
          <button id="buttonShowLogs">
            <div>off</div>
          </button>
          <p>Show logs in the console</p>
        </div>
        <p><u>Sources options</u></p>
        <fieldset>
          <legend>Type of source to configure:</legend>
          <div>
            <input id="buttonUrlsBlacklist" type="radio" name="urlType" />
            <label for="buttonUrlsBlacklist"
              >Sources to omit (exact match)</label
            >
          </div>
          <div>
            <input id="buttonUrlsNotify" type="radio" name="urlType" />
            <label for="buttonUrlsNotify"
              >Sources to notify when are detected</label
            >
          </div>
          <div>
            <input id="buttonUrlsReferer" type="radio" name="urlType" />
            <label for="buttonUrlsReferer"
              >Sites where first source opens automatically</label
            >
          </div>
        </fieldset>
        <div id="sourcesConfigValues" class="hidden">
          <p id="pInput">New values</p>
          <textarea
            id="inputUrl"
            type="text"
            style="resize: vertical"
            rows="2"
          ></textarea>
          <div class="oneLineButtons">
            <button id="buttonAddUrl">Add</button>
            <button id="buttonClearAll">Clear all</button>
          </div>
        </div>
        <div class="info-container"></div>
      </div>
    </div>
    <script type="module" src="popup.js"></script>
  </body>
</html>
